<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>色彩记忆游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎨 色彩记忆游戏</h1>
    
    <div class="scores">
      <div class="score-item">
        <span class="score-label">当前关卡</span>
        <span id="current-level" class="score-value">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">最高记录</span>
        <span id="high-score" class="score-value">0</span>
      </div>
    </div>

    <div id="game-status" class="game-status">点击开始按钮开始游戏</div>

    <div class="game-board">
      <button class="color-btn red" data-color="red"><span class="btn-label">红</span></button>
      <button class="color-btn yellow" data-color="yellow"><span class="btn-label">黄</span></button>
      <button class="color-btn blue" data-color="blue"><span class="btn-label">蓝</span></button>
      <button class="color-btn green" data-color="green"><span class="btn-label">绿</span></button>
    </div>

    <div class="controls">
      <button id="start-btn" class="start-btn">开始游戏</button>
    </div>

    <div class="settings-panel">
      <h3>🎮 反馈设置</h3>
      <div class="setting-item">
        <label for="sound-toggle">
          <span class="setting-icon">🔊</span>
          <span class="setting-text">点击音效</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="sound-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-item">
        <label for="text-hint-toggle">
          <span class="setting-icon">💬</span>
          <span class="setting-text">文字提示</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="text-hint-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-item">
        <label for="vibration-toggle">
          <span class="setting-icon">📳</span>
          <span class="setting-text">画面震动</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="vibration-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="instructions">
      <h3>游戏规则</h3>
      <p>1. 观察亮起的按钮顺序</p>
      <p>2. 按相同顺序点击按钮</p>
      <p>3. 每过一关，序列增加一个</p>
      <p>4. 按错一次即游戏结束</p>
    </div>
  </div>

  <script type="module" src="game.ts"></script>
</body>
</html>
